{% extends "base.html" %}

{% block title %}Book Appointment with {{ consultant.full_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Book Appointment with {{ consultant.full_name }}</h3>
            </div>
            <div class="card-body">
                <form method="POST" id="bookingForm">
                    <div class="mb-3">
                        <label for="date" class="form-label">Select Date</label>
                        <input type="date" class="form-control" id="date" name="date" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="time_slot" class="form-label">Select Time Slot</label>
                        <select class="form-select" id="time_slot" name="time_slot" required>
                            <option value="09:00-10:00">09:00 - 10:00</option>
                            <option value="10:00-11:00">10:00 - 11:00</option>
                            <option value="11:00-12:00">11:00 - 12:00</option>
                            <option value="14:00-15:00">14:00 - 15:00</option>
                            <option value="15:00-16:00">15:00 - 16:00</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>
                    
                    <input type="hidden" id="start_time" name="start_time" value="09:00">
                    <input type="hidden" id="end_time" name="end_time" value="10:00">
                    
                    <button type="submit" class="btn btn-primary">Book Appointment</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('time_slot').addEventListener('change', function() {
    const [start, end] = this.value.split('-');
    document.getElementById('start_time').value = start;
    document.getElementById('end_time').value = end;
    console.log('Time selected:', start, end);
});

document.getElementById('bookingForm').addEventListener('submit', function(e) {
    console.log('Form submitted');
    console.log('Date:', document.getElementById('date').value);
    console.log('Start:', document.getElementById('start_time').value);
    console.log('End:', document.getElementById('end_time').value);
});
</script>
{% endblock %}
