{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card fade-in-up">
            <div class="card-header text-center">
                <i class="fas fa-user-plus fa-2x mb-2"></i>
                <h3 class="mb-0">Create an Account</h3>
                <p class="mb-0 opacity-75">Join ConsultantEase today</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">
                                <i class="fas fa-user me-2"></i>Username
                            </label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope me-2"></i>Email
                            </label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-2"></i>Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="At least 6 characters" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="full_name" class="form-label">
                                <i class="fas fa-id-card me-2"></i>Full Name
                            </label>
                            <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Your full name" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">
                                <i class="fas fa-phone me-2"></i>Phone Number
                            </label>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+1234567890" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="user_type" class="form-label">
                                <i class="fas fa-user-tag me-2"></i>I am a
                            </label>
                            <select class="form-select" id="user_type" name="user_type" required>
                                <option value="client">📋 Client (Looking for consultation)</option>
                                <option value="consultant">👨‍⚕️ Consultant (Offering services)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="consultantFields" style="display: none;">
                        <hr>
                        <h5 class="mb-3"><i class="fas fa-briefcase me-2"></i>Professional Information</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="profession" class="form-label">Profession</label>
                                <input type="text" class="form-control" id="profession" name="profession" placeholder="e.g., Doctor, Lawyer">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="experience" class="form-label">Years of Experience</label>
                                <input type="number" class="form-control" id="experience" name="experience" placeholder="Years">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="license_number" class="form-label">
                                <i class="fas fa-certificate me-2"></i>Professional License Number
                            </label>
                            <input type="text" class="form-control" id="license_number" name="license_number" placeholder="Enter your license number">
                            <small class="text-muted">This will be verified by our team</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="bio" class="form-label">Professional Bio</label>
                            <textarea class="form-control" id="bio" name="bio" rows="3" placeholder="Tell us about your expertise..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="hourly_rate" class="form-label">Hourly Rate ($)</label>
                            <input type="number" step="0.01" class="form-control" id="hourly_rate" name="hourly_rate" placeholder="0.00">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-3">
                        <i class="fas fa-user-plus me-2"></i>Register
                        <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Already have an account?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary w-100 mt-2 py-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Login Here
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('user_type').addEventListener('change', function() {
        const consultantFields = document.getElementById('consultantFields');
        if (this.value === 'consultant') {
            consultantFields.style.display = 'block';
        } else {
            consultantFields.style.display = 'none';
        }
    });
</script>
{% endblock %}
